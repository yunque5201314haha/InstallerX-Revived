name: InstallerX-最终暴力修改版

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 同步上游 (保留此yml)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/wxxsfxyzm/InstallerX-Revived.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -X ours -m "chore: sync upstream"
          git push origin main

      - name: 3. 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 4. 修改包名
        run: |
          NEW="com.android.packageinstaller"
          OLD_SCHEMA="com.rosan.installer.data.settings.local.room.InstallerRoom"
          NEW_SCHEMA="com.android.packageinstaller.data.settings.local.room.InstallerRoom"

          echo "=== 1. 写死 APP_ID ==="
          echo "APP_ID=${NEW}" >> gradle.properties

          echo "=== 2. 强制覆盖 applicationId (不动namespace) ==="
          sed -i "s|applicationId = project.findProperty(\"APP_ID\") as String?|applicationId = \"${NEW}\"|g" app/build.gradle.kts
          sed -i "s|applicationId = \"[^\"]*\"|applicationId = \"${NEW}\"|g" app/build.gradle.kts

          echo "=== 3. 重命名 schema 目录 ==="
          if [ -d "app/schemas/${OLD_SCHEMA}" ]; then
            mv "app/schemas/${OLD_SCHEMA}" "app/schemas/${NEW_SCHEMA}"
            echo "重命名成功: ${NEW_SCHEMA}"
          else
            echo "schema目录不存在，跳过"
            ls app/schemas/
          fi

          echo "=== 4. 替换 schema json 内容 ==="
          find app/schemas -name "*.json" \
            | xargs --no-run-if-empty sed -i "s|com\.rosan\.installer|com.android.packageinstaller|g"

          chmod +x gradlew

          echo "=== 验证 ==="
          grep -n "applicationId\|namespace" app/build.gradle.kts
          ls app/schemas/

      - name: 5. 注入 Gradle 凭证
        run: |
          mkdir -p ~/.gradle
          echo "gpr.user=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> ~/.gradle/gradle.properties

      - name: 6. 编译 Release
        run: ./gradlew clean assembleOfflineStableRelease --stacktrace --no-daemon

      - name: 7. 整理 APK
        run: |
          mkdir -p dist
          find app/build/outputs/apk/ -name "*.apk" | while read f; do
            fname=$(basename "$f")
            cp "$f" "dist/InstallerX-packageinstaller-${fname}"
          done
          echo "=== 构建产物 ==="
          ls -lh dist/

      - name: 8. 发送到 Telegram
        if: success()
        run: |
          for apk in dist/*.apk; do
            echo "发送: $apk"
            resp=$(curl -s \
              -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -F "document=@$apk" \
              -F "caption=✅ 构建成功 | 包名: com.android.packageinstaller | $(date '+%Y-%m-%d %H:%M') UTC" \
              "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument")
            echo "$resp"
            if echo "$resp" | grep -q '"ok":false'; then
              echo "❌ 发送失败"
              exit 1
            fi
          done

      - name: 9. 上传 Artifact 备份
        uses: actions/upload-artifact@v4
        with:
          name: InstallerX-packageinstaller
          path: dist/*.apk

