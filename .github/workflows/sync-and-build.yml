name: InstallerX-最终暴力修改版

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安全同步 (保留此yml)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/wxxsfxyzm/InstallerX-Revived.git
          git fetch upstream
          # 使用 merge -X ours 确保你的 yml 配置文件不会被冲掉
          git merge upstream/main --allow-unrelated-histories -X ours
          git push origin main

      - name: 3. 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 4. 暴力修改全项目包名 (com.android.packageinstaller)
        run: |
          OLD_ID="com.wxxsfxyzm.installerx"
          NEW_ID="com.android.packageinstaller"
          
          echo "开始全量替换包名从 $OLD_ID 到 $NEW_ID ..."
          
          # 1. 遍历所有文件，只要内容包含旧包名，全部替换
          # 这会覆盖 build.gradle.kts, AndroidManifest, Java/Kotlin 源码
          grep -rl "$OLD_ID" . | xargs sed -i "s/$OLD_ID/$NEW_ID/g"
          
          # 2. 针对 Gradle 里的 applicationId 再次强化替换，确保万无一失
          find . -name "build.gradle*" -exec sed -i "s/applicationId = \".*\"/applicationId = \"$NEW_ID\"/g" {} +
          find . -name "build.gradle*" -exec sed -i "s/applicationId \".*\"/applicationId \"$NEW_ID\"/g" {} +

          chmod +x gradlew
          echo "替换完成。"

      - name: 5. 注入凭证
        run: |
          mkdir -p ~/.gradle
          echo "gpr.user=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> ~/.gradle/gradle.properties

      - name: 6. 执行编译 (Release)
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: 7. 推送至 Telegram
        if: success()
        run: |
          # 搜索所有 APK 并发送
          APK_PATH=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
          APK_NAME=$(basename $APK_PATH)
          
          curl -v -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
               -F "document=@$APK_PATH" \
               -F "caption=✅ 构建成功！%0A📦 已修改包名为: com.android.packageinstaller" \
               "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument"

      - name: 8. 上传备份
        uses: actions/upload-artifact@v4
        with:
          name: InstallerX-Final
          path: app/build/outputs/apk/**/*.apk
