name: AutoBuild

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 同步上游 (保留此yml)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/wxxsfxyzm/InstallerX-Revived.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -X ours -m "chore: sync upstream" || true
          git push origin main || true

      - name: 3. 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 4. 修改包名
        run: |
          NEW="com.android.packageinstaller"
          echo "APP_ID=${NEW}" >> gradle.properties
          sed -i "s|applicationId = project.findProperty(\"APP_ID\") as String?|applicationId = \"${NEW}\"|g" app/build.gradle.kts
          sed -i "s|applicationId = \"[^\"]*\"|applicationId = \"${NEW}\"|g" app/build.gradle.kts
          find app/src/main/ -name "AndroidManifest.xml" -exec sed -i "s/com.rosan.installer.fileprovider/${NEW}.fileprovider/g" {} +
          chmod +x gradlew
          grep -n "applicationId\|namespace" app/build.gradle.kts

      - name: 5. 注入 Gradle 凭证
        run: |
          mkdir -p ~/.gradle
          echo "gpr.user=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> ~/.gradle/gradle.properties

      - name: 6. 编译 Release
        run: ./gradlew clean assembleOnlineStableRelease --stacktrace --no-daemon

      - name: 7. 整理 APK
        run: |
          mkdir -p dist
          find app/build/outputs/apk/ -name "*.apk" | while read f; do
            fname=$(basename "$f")
            cp "$f" "dist/InstallerX-packageinstaller-${fname}"
          done
          ls -lh dist/

      - name: 8. 发送到 Telegram
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          APK=$(find dist/ -name "*.apk" | head -1)
          VERSION=$(echo "$APK" | grep -oP '\d+\.\d+' | head -1)
          BUILD_TIME=$(date '+%Y-%m-%d %H:%M')
          REPO_URL="https://github.com/${REPO}"
          RUNS_URL="${REPO_URL}/actions/runs/${RUN_ID}"
          printf "InstallerX 自动构建\n\n版本: %s\n提交: %s\n时间: %s UTC\n\n仓库: %s\n构建详情: %s\n\n#InstallerX更新" \
            "$VERSION" "$ACTOR" "$BUILD_TIME" "$REPO_URL" "$RUNS_URL" > /tmp/caption.txt
          for apk in dist/*.apk; do
            resp=$(curl -s \
              -F "chat_id=${TG_CHAT}" \
              -F "document=@$apk" \
              -F "caption=$(cat /tmp/caption.txt)" \
              "https://api.telegram.org/bot${TG_TOKEN}/sendDocument")
            echo "$resp"
            if echo "$resp" | grep -q '"ok":false'; then
              echo "发送失败"
              exit 1
            fi
          done

      - name: 9. 上传 Artifact 备份
        uses: actions/upload-artifact@v4
        with:
          name: InstallerX-packageinstaller
          path: dist/*.apk
